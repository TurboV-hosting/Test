<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURBOV - Customer Reviews</title>
    <link rel="icon" type="image/jpeg" href="dev.jpg">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* Color Palette & Base Styles */
        :root {
            --bg-dark: #0b141a;
            --card-bg: rgba(19, 34, 44, 0.75); /* Slight alpha transparency for glassmorphism layout */
            --primary-teal: #00f2fe;
            --accent-blue: #0072ff;
            --text-light: #e2f1f8;
            --text-muted: #8ca3b1;
            --border-color: rgba(30, 53, 69, 0.6);
            --star-color: #ffd700;
            --warning-red: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 3rem 1rem;
        }

        /* Main Container */
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .brand-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary-teal), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
        }

        /* Top Actions */
        .header-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            background: linear-gradient(135deg, var(--primary-teal), var(--accent-blue));
        }

        .btn-secondary {
            background: rgba(11, 20, 26, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            border-color: var(--primary-teal);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
        }

        /* Reviews Grid */
        .reviews-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            text-align: left;
        }

        .review-card {
            background: linear-gradient(145deg, var(--card-bg), rgba(14, 27, 36, 0.8));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .review-card:hover {
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .reviewer-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .review-stars {
            color: var(--star-color);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .review-text {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .review-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }

        /* Modal Popup Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 14, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #13222c;
            border: 1px solid var(--primary-teal);
            padding: 2.5rem;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.15);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .modal-header h3 {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .modal-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Notice Box Style */
        .modal-notice {
            background-color: rgba(255, 74, 74, 0.1);
            border: 1px solid var(--warning-red);
            color: #ff9d9d;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1rem;
            line-height: 1.4;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background-color: #0b141a;
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            color: #ffffff;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-teal);
        }

        select.form-control {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%238ca3b1'><polygon points='0,0 10,0 5,5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* Form Buttons */
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-teal), var(--accent-blue));
            color: #0b141a;
            font-weight: 700;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-title">Turbov</h1>
        <p class="brand-subtitle">Customer Reviews</p>

        <div class="header-actions">
            <a href="/" class="btn-secondary">Back to Home</a>
            <button class="btn-primary" id="openReviewModalBtn">Write a Review</button>
        </div>

        <div class="reviews-grid" id="reviewsContainer">
            <div class="empty-state">Loading reviews...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Leave a Review</h3>
                <p>Share your experience with our services.</p>
                <div class="modal-notice">
                    ⚠️ Leaving False Reviews will Result in your review getting deleted.
                </div>
            </div>
            
            <form id="reviewForm">
                <div class="form-group">
                    <label for="reviewerName">Your Name</label>
                    <input type="text" id="reviewerName" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="reviewerEmail">Your Email (Kept Private)</label>
                    <input type="email" id="reviewerEmail" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="reviewRating">Rating</label>
                    <select id="reviewRating" class="form-control" required>
                        <option value="5">⭐⭐⭐⭐⭐ (5/5) - Excellent</option>
                        <option value="4">⭐⭐⭐⭐ (4/5) - Very Good</option>
                        <option value="3">⭐⭐⭐ (3/5) - Average</option>
                        <option value="2">⭐⭐ (2/5) - Poor</option>
                        <option value="1">⭐ (1/5) - Terrible</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reviewMessage">Your Review</label>
                    <textarea id="reviewMessage" class="form-control" placeholder="Tell us what you loved..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitBtn">Post Review</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCS5WN2sPDYFDChynMl_xbutjbPQO4FON0",
            authDomain: "turbov-dev.firebaseapp.com",
            projectId: "turbov-dev",
            storageBucket: "turbov-dev.firebasestorage.app",
            messagingSenderId: "251894886123",
            appId: "1:251894886123:web:8ce6847f9a2969fec9d8ae",
            measurementId: "G-MFYZPXGP87"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Modal Logic
        const modalOverlay = document.getElementById('modalOverlay');
        const openModalBtn = document.getElementById('openReviewModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const reviewForm = document.getElementById('reviewForm');
        const submitBtn = document.getElementById('submitBtn');
        const reviewsContainer = document.getElementById('reviewsContainer');

        openModalBtn.addEventListener('click', () => {
            modalOverlay.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            reviewForm.reset();
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
                reviewForm.reset();
            }
        });

        // 3. Handle Form Submission & Webhook integration
        reviewForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('reviewerName').value;
            const email = document.getElementById('reviewerEmail').value;
            const rating = parseInt(document.getElementById('reviewRating').value);
            const message = document.getElementById('reviewMessage').value;

            submitBtn.textContent = "Posting...";
            submitBtn.disabled = true;

            try {
                // Save to Firestore
                await db.collection("reviews").add({
                    name: name,
                    email: email,
                    rating: rating,
                    message: message,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Send Notification to Discord Webhook as a Rich Embed
                const webhookUrl = "https://discord.com/api/webhooks/1520440953381326998/LdhRBENtDaMk9o5NvMxJb40srqMzwDMlNc1PW14Bi9UY24_ruqfkrb1KGa27k5gI4l8f";
                const starString = "⭐".repeat(rating);
                
                const discordPayload = {
                    embeds: [{
                        title: "📝 New Customer Review Submitted!",
                        color: 62206, // Numeric conversion for your primary teal theme #00f2fe
                        fields: [
                            {
                                name: "👤 Name",
                                value: name,
                                inline: true
                            },
                            {
                                name: "⭐ Rating",
                                value: `${starString} (${rating}/5)`,
                                inline: true
                            },
                            {
                                name: "💬 Written Review",
                                value: message,
                                inline: false
                            }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: {
                            text: "Turbov Review Logs Tracker"
                        }
                    }]
                };

                await fetch(webhookUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(discordPayload)
                });

                modalOverlay.classList.remove('active');
                reviewForm.reset();
                alert("Thank you for your review!");
            } catch (error) {
                console.error("Error processing request: ", error);
                alert("There was an error posting your review. Check the console.");
            } finally {
                submitBtn.textContent = "Post Review";
                submitBtn.disabled = false;
            }
        });

        // 4. Listen for existing reviews in real-time
        db.collection("reviews")
            .orderBy("timestamp", "desc")
            .onSnapshot((snapshot) => {
                reviewsContainer.innerHTML = ""; 
                
                if (snapshot.empty) {
                    reviewsContainer.innerHTML = `<div class="empty-state">No reviews yet. Be the first to leave one!</div>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    const starString = "⭐".repeat(data.rating || 5);
                    
                    let dateString = "Just now";
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        dateString = date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                    }

                    const card = document.createElement('div');
                    card.className = 'review-card';
                    card.innerHTML = `
                        <div class="review-header">
                            <div class="reviewer-name">${escapeHTML(data.name)}</div>
                            <div class="review-stars">${starString}</div>
                        </div>
                        <div class="review-text">${escapeHTML(data.message)}</div>
                        <div class="review-date">${dateString}</div>
                    `;
                    
                    reviewsContainer.appendChild(card);
                });
            }, (error) => {
                console.error("Error fetching reviews: ", error);
                reviewsContainer.innerHTML = `<div class="empty-state">Error loading reviews. Check Firestore permissions.</div>`;
            });

        // Helper function to prevent XSS injection
        function escapeHTML(str) {
            if(!str) return "";
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
